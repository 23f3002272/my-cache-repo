name: Cache Demo

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Prime cache c5afdfd
      id: cache-step
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: cache-c5afdfd
        
    - name: Show cache result
      run: echo "Cache hit/miss: ${{ steps.cache-step.outputs.cache-hit }}"
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: python -c "import requests; print('Dependencies cached successfully!')"
